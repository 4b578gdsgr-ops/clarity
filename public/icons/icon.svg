<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1a3328"/>
  <!-- Bicycle wheel outlines -->
  <circle cx="160" cy="320" r="88" fill="none" stroke="#4ade80" stroke-width="22"/>
  <circle cx="352" cy="320" r="88" fill="none" stroke="#4ade80" stroke-width="22"/>
  <!-- Spokes - front wheel -->
  <line x1="160" y1="232" x2="160" y2="408" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <line x1="72" y1="320" x2="248" y2="320" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <line x1="98" y1="258" x2="222" y2="382" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <line x1="222" y1="258" x2="98" y2="382" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <!-- Spokes - rear wheel -->
  <line x1="352" y1="232" x2="352" y2="408" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <line x1="264" y1="320" x2="440" y2="320" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <line x1="290" y1="258" x2="414" y2="382" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <line x1="414" y1="258" x2="290" y2="382" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <!-- Frame: chain stay and seat stay -->
  <polyline points="160,320 256,200 352,320" fill="none" stroke="#ffffff" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Down tube to bottom bracket -->
  <line x1="256" y1="200" x2="256" y2="320" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  <!-- Seat tube -->
  <line x1="256" y1="320" x2="220" y2="195" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  <!-- Handlebar stem -->
  <line x1="256" y1="200" x2="290" y2="168" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <line x1="275" y1="168" x2="308" y2="168" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Saddle -->
  <line x1="205" y1="188" x2="240" y2="188" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Hub dots -->
  <circle cx="160" cy="320" r="12" fill="#4ade80"/>
  <circle cx="352" cy="320" r="12" fill="#4ade80"/>
  <circle cx="256" cy="320" r="10" fill="#4ade80"/>
</svg>
